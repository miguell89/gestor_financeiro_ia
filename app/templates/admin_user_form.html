{% extends "base.html" %}
{% set page_title = "Novo usuário" if mode == "create" else "Editar usuário" %}

{% block content %}
<form class="panel form-panel admin-edit-form" method="post">
  <div class="panel-heading">
    <h2>{{ "Criar usuário" if mode == "create" else user.name }}</h2>
    <a href="{{ url_for('web.admin_users') }}">Voltar</a>
  </div>

  {% if error %}
  <div class="form-feedback error">{{ error }}</div>
  {% endif %}

  <label>Nome <input name="name" value="{{ user.name if user else '' }}" required></label>
  <label>Email <input type="email" name="email" value="{{ user.email if user else '' }}" required></label>
  <label>Perfil
    <select name="role">
      <option value="user" {% if not user or user.role == 'user' %}selected{% endif %}>user</option>
      <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>admin</option>
    </select>
  </label>
  <label>Status
    <select name="status">
      <option value="ativo" {% if not user or user.status == 'ativo' %}selected{% endif %}>ativo</option>
      <option value="inativo" {% if user and user.status == 'inativo' %}selected{% endif %}>inativo</option>
    </select>
  </label>
  <label>{{ "Senha inicial" if mode == "create" else "Nova senha" }}
    <input type="password" name="password" placeholder="{{ 'Obrigatória para novo usuário' if mode == 'create' else 'Deixe vazio para manter' }}" {% if mode == "create" %}required{% endif %}>
  </label>
  <label class="checkbox-row"><input type="checkbox" name="receive_telegram_alerts" value="1" {% if user and user.receive_telegram_alerts %}checked{% endif %}> Receber alertas pelo Telegram</label>
  <label class="checkbox-row"><input type="checkbox" name="receive_telegram_reports" value="1" {% if user and user.receive_telegram_reports %}checked{% endif %}> Receber relatórios pelo Telegram</label>
  <label class="checkbox-row"><input type="checkbox" name="receive_telegram_bill_reminders" value="1" {% if user and user.receive_telegram_bill_reminders %}checked{% endif %}> Receber lembretes de contas</label>
  <label class="checkbox-row"><input type="checkbox" name="receive_telegram_ai_analysis" value="1" {% if user and user.receive_telegram_ai_analysis %}checked{% endif %}> Receber análises da IA</label>
  <button class="primary-button">{{ "Criar usuário" if mode == "create" else "Salvar alterações" }}</button>
</form>
{% endblock %}
