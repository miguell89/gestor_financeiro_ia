{% extends "base.html" %}
{% set page_title = "Editar usuario" %}

{% block content %}
<form class="panel form-panel admin-edit-form" method="post">
  <h2>{{ user.name }}</h2>
  <label>Nome <input name="name" value="{{ user.name }}" required></label>
  <label>Email <input type="email" name="email" value="{{ user.email or '' }}"></label>
  <label>Telegram ID <input name="telegram_id" value="{{ user.telegram_id or '' }}"></label>
  <label>Telegram username <input name="telegram_username" value="{{ user.telegram_username or '' }}"></label>
  <label>Telegram nome <input name="telegram_first_name" value="{{ user.telegram_first_name or '' }}"></label>
  <label>Perfil
    <select name="role">
      <option value="user" {% if user.role == 'user' %}selected{% endif %}>user</option>
      <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option>
    </select>
  </label>
  <label>Status
    <select name="status">
      <option value="ativo" {% if user.status == 'ativo' %}selected{% endif %}>ativo</option>
      <option value="inativo" {% if user.status == 'inativo' %}selected{% endif %}>inativo</option>
    </select>
  </label>
  <label>Nova senha <input type="password" name="password" placeholder="Deixe vazio para manter"></label>
  <button class="primary-button">Salvar alteracoes</button>
</form>
{% endblock %}
