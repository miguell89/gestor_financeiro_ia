services:
  - type: web
    name: gestor-financeiro-ia-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-financeiro-ia-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MODE
        value: polling
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false

  - type: worker
    name: gestor-financeiro-ia-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -B -m bot.telegram_bot
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-financeiro-ia-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MODE
        value: polling
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false

databases:
  - name: gestor-financeiro-ia-db
    databaseName: gestor_financeiro_ia
    user: gestor_financeiro_ia
